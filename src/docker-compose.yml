services:
  db:
    image: ankane/pgvector:latest  
    container_name: vector_db_container
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdocs_api
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - files_data:/app/files
      - uploads_data:/app/uploads
      - hf_cache:/app/.cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status', timeout=2)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  gui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartdocs_gui
    environment:
      API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: ["streamlit", "run", "src/gui/gui.py", "--server.address=0.0.0.0", "--server.port=8501"]
    ports:
      - "8501:8501"
    restart: always

volumes:
  postgres_data:
  files_data:
  uploads_data:
  hf_cache:
